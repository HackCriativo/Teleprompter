<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hack Criativo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --accent: #00ff88;
    --accent-dim: #00ff8833;
    --text: #f0f0f0;
    --muted: #555;
    --red: #ff4444;
  }
  body.light-theme {
    --bg: #ffffff;
    --surface: #f4f4f4;
    --border: #ddd;
    --accent: #007a3d;
    --accent-dim: #007a3d22;
    --text: #111111;
    --muted: #999;
    --red: #cc2222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.2s, color 0.2s;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    height: 44px;
    overflow: hidden;
    transition: opacity 0.4s, height 0.4s, padding 0.4s, border-color 0.4s;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: pulse 1.5s ease-in-out infinite;
    display: none;
  }
  .dot.active { display: block; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── CONTROLS ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: 88px;
    overflow: hidden;
    transition: opacity 0.4s, height 0.4s, padding 0.4s, border-color 0.4s;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── AUTO-HIDE durante play ── */
  body.playing header,
  body.playing .controls {
    opacity: 0;
    height: 0 !important;
    padding-top: 0 !important;
    padding-bottom: 0 !important;
    pointer-events: none;
    border-color: transparent !important;
  }
  body.playing.peek header {
    opacity: 1;
    height: 44px !important;
    padding: 8px 16px !important;
    pointer-events: all;
    border-color: var(--border) !important;
  }
  body.playing.peek .controls {
    opacity: 1;
    height: 88px !important;
    padding: 8px 16px !important;
    pointer-events: all;
    border-color: var(--border) !important;
  }

  /* dica de toque */
  .tap-hint {
    position: fixed;
    bottom: 54px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    white-space: nowrap;
    z-index: 50;
    text-transform: uppercase;
  }
  body.playing .tap-hint { opacity: 1; }
  body.playing.peek .tap-hint { opacity: 0; }

  /* ── WIDGETS ── */
  .ctrl-icon {
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
    cursor: default;
    user-select: none;
    color: var(--muted);
  }
  .ctrl-icon.label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }
  .ctrl-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 26px;
    text-align: center;
  }
  input[type="range"] {
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    width: 90px;
    flex-shrink: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 6px var(--accent);
  }
  .divider-v { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px;
    border: none; border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  /* texto do botão play sempre preto independente do tema */
  .btn-play { background: var(--accent); color: #000 !important; }
  .btn-play:hover { filter: brightness(1.1); transform: scale(1.03); }
  .btn-stop { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-stop:hover { background: #ff444422; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: #888; }
  .btn-ghost.on { color: var(--accent); border-color: var(--accent); }
  .btn-icon { padding: 6px 9px; font-size: 14px; line-height: 1; }
  .spacer { flex: 1; }

  /* ── MAIN ── */
  .main { flex: 1; position: relative; overflow: hidden; min-height: 0; }
  .fade-top, .fade-bottom {
    position: absolute; left: 0; right: 0; height: 90px;
    z-index: 10; pointer-events: none;
  }
  .fade-top { top: 0; background: linear-gradient(to bottom, var(--bg), transparent); }
  .fade-bottom { bottom: 0; background: linear-gradient(to top, var(--bg), transparent); }
  .center-line {
    position: absolute; left: 0; right: 0; top: 50%;
    transform: translateY(-50%); height: 2px;
    background: linear-gradient(to right, transparent, var(--accent-dim), var(--accent), var(--accent-dim), transparent);
    z-index: 5; pointer-events: none;
  }
  .scroll-wrapper { height: 100%; overflow: hidden; position: relative; }
  .scroll-content { padding: 50vh 10% 50vh; }
  .prompter-text {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    transition: font-size 0.2s;
    text-align: left;
  }

  /* espelhos */
  .mirror-h .scroll-content { transform: scaleX(-1); }
  .mirror-v .scroll-content { transform: scaleY(-1); }
  .mirror-h.mirror-v .scroll-content { transform: scaleX(-1) scaleY(-1); }

  /* ── SEEKBAR — sempre visível, fora do fluxo do auto-hide ── */
  .seekbar-wrap {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    /* nunca ocultar — fica fixo no rodapé */
    position: relative;
    z-index: 30;
  }
  .seek-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted);
    font-weight: 600; white-space: nowrap;
  }
  #seekBar { flex: 1; height: 4px; cursor: pointer; min-width: 0; width: auto; }
  #seekBar::-webkit-slider-thumb { width: 20px; height: 20px; box-shadow: 0 0 8px var(--accent); }
  .seek-pct {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: var(--accent);
    min-width: 36px; text-align: right;
  }

  /* ── EDITOR ── */
  .editor-panel {
    position: absolute; inset: 0;
    background: rgba(10,10,10,0.97);
    z-index: 20; display: none;
    flex-direction: column; padding: 20px; gap: 12px;
  }
  body.light-theme .editor-panel { background: rgba(255,255,255,0.97); }
  .editor-panel.open { display: flex; }
  .editor-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted); font-weight: 600;
  }
  textarea {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 14px; line-height: 1.6; padding: 16px;
    resize: none; outline: none; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  .editor-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-confirm { background: var(--accent); color: #000 !important; }
  .btn-confirm:hover { filter: brightness(1.1); }

  /* ── KEY BADGE ── */
  #keyBadge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--muted);
    background: var(--border);
    padding: 3px 8px; border-radius: 4px;
    letter-spacing: 1px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">HACK CRIATIVO</div>
  <div id="keyBadge">—</div>
  <div class="dot" id="recDot"></div>
</header>

<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-icon" title="Velocidade">🐢</span>
    <input type="range" id="speedSlider" min="10" max="140" value="36">
    <span class="ctrl-value" id="speedVal">36</span>
    <div class="divider-v"></div>
    <span class="ctrl-icon label" title="Tamanho do texto">T</span>
    <input type="range" id="sizeSlider" min="18" max="72" value="36">
    <span class="ctrl-value" id="sizeVal">36</span>
  </div>
  <div class="ctrl-row">
    <button class="btn btn-play" id="playBtn" onclick="startPlay()">▶ PLAY</button>
    <button class="btn btn-stop" id="pauseBtn" onclick="pausePlay()" style="display:none">⏸ PAUSA</button>
    <button class="btn btn-ghost" onclick="resetPlay()">↺ Reset</button>
    <div class="divider-v"></div>
    <button class="btn btn-ghost btn-icon" id="mirrorHBtn" onclick="toggleMirrorH()" title="Espelhar horizontal">⇄</button>
    <button class="btn btn-ghost btn-icon" id="mirrorVBtn" onclick="toggleMirrorV()" title="Inverter vertical">⇅</button>
    <button class="btn btn-ghost btn-icon" id="themeBtn" onclick="toggleTheme()" title="Alternar tema">☀</button>
    <div class="spacer"></div>
    <button class="btn btn-ghost" onclick="openEditor()">✎ Editar</button>
  </div>
</div>

<div class="tap-hint">toque na tela para exibir controles</div>

<div class="main">
  <div class="fade-top"></div>
  <div class="center-line"></div>
  <div class="scroll-wrapper" id="scrollWrapper">
    <div class="scroll-content">
      <div class="prompter-text" id="promptText"></div>
    </div>
  </div>
  <div class="fade-bottom"></div>

  <div class="editor-panel" id="editorPanel">
    <span class="editor-label">Digite ou cole seu roteiro</span>
    <textarea id="scriptInput" placeholder="Cole aqui o seu roteiro..."></textarea>
    <div class="editor-actions">
      <button class="btn btn-ghost" onclick="closeEditor()">Cancelar</button>
      <button class="btn btn-confirm" onclick="applyText()">✓ Confirmar</button>
    </div>
  </div>
</div>

<div class="seekbar-wrap">
  <span class="seek-label">Posição</span>
  <input type="range" id="seekBar" min="0" max="1000" value="0">
  <span class="seek-pct" id="seekPct">0%</span>
</div>

<script>
  let isPlaying   = false;
  let isMirroredH = false;
  let isMirroredV = false;
  let isLight     = false;
  let animFrame   = null;
  let lastTime    = null;
  let scrollPos   = 0;
  let isSeeking   = false;
  let peekTimer   = null;

  const wrapper     = document.getElementById('scrollWrapper');
  const promptText  = document.getElementById('promptText');
  const speedSlider = document.getElementById('speedSlider');
  const sizeSlider  = document.getElementById('sizeSlider');
  const speedVal    = document.getElementById('speedVal');
  const sizeVal     = document.getElementById('sizeVal');
  const recDot      = document.getElementById('recDot');
  const seekBar     = document.getElementById('seekBar');
  const seekPct     = document.getElementById('seekPct');
  const keyBadge    = document.getElementById('keyBadge');

  const defaultText = `Olá, bem-vindo ao Hack Criativo Teleprompter!\n\nClique em "Editar" para colar o seu roteiro.\n\nAjuste a Velocidade 🐢 e o Tamanho T da fonte nos controles acima.\n\nPressione PLAY — os controles somem automaticamente.\nToque na tela para reexibi-los por alguns segundos.\n\n⇄  espelha o texto horizontalmente\n⇅  inverte verticalmente (para espelho físico)\n☀  alterna entre tema escuro e claro`;

  promptText.textContent = defaultText;
  promptText.style.fontSize = sizeSlider.value + 'px';

  speedSlider.addEventListener('input', () => { speedVal.textContent = speedSlider.value; });
  sizeSlider.addEventListener('input', () => {
    sizeVal.textContent = sizeSlider.value;
    promptText.style.fontSize = sizeSlider.value + 'px';
  });

  function getMaxScroll() { return wrapper.scrollHeight - wrapper.clientHeight; }

  function applyScroll() {
    const max = getMaxScroll();
    wrapper.scrollTop = isMirroredV ? (max - scrollPos) : scrollPos;
  }

  function updateSeek() {
    if (isSeeking) return;
    const max = getMaxScroll();
    const pct = max > 0 ? scrollPos / max : 0;
    seekBar.value = Math.round(pct * 1000);
    seekPct.textContent = Math.round(pct * 100) + '%';
  }

  seekBar.addEventListener('mousedown', () => { isSeeking = true; });
  seekBar.addEventListener('touchstart', () => { isSeeking = true; }, { passive: true });
  seekBar.addEventListener('input', () => {
    const pct = seekBar.value / 1000;
    scrollPos = pct * getMaxScroll();
    applyScroll();
    seekPct.textContent = Math.round(pct * 100) + '%';
  });
  seekBar.addEventListener('mouseup',  () => { isSeeking = false; lastTime = null; });
  seekBar.addEventListener('touchend', () => { isSeeking = false; lastTime = null; });

  function tick(ts) {
    if (!isPlaying) return;
    if (!lastTime) lastTime = ts;
    const delta = (ts - lastTime) / 1000;
    lastTime = ts;
    scrollPos += parseFloat(speedSlider.value) * delta;
    const max = getMaxScroll();
    if (scrollPos >= max) {
      scrollPos = max;
      applyScroll(); updateSeek(); stopPlay(); return;
    }
    applyScroll(); updateSeek();
    animFrame = requestAnimationFrame(tick);
  }

  function startPlay() {
    if (isPlaying) return;
    isPlaying = true; lastTime = null;
    document.body.classList.add('playing');
    recDot.classList.add('active');
    document.getElementById('playBtn').style.display  = 'none';
    document.getElementById('pauseBtn').style.display = 'inline-flex';
    animFrame = requestAnimationFrame(tick);
  }

  function pausePlay() {
    isPlaying = false;
    document.body.classList.remove('playing', 'peek');
    recDot.classList.remove('active');
    document.getElementById('playBtn').style.display  = 'inline-flex';
    document.getElementById('pauseBtn').style.display = 'none';
    if (animFrame) cancelAnimationFrame(animFrame);
    clearTimeout(peekTimer);
  }

  function stopPlay() { pausePlay(); }

  function resetPlay() {
    pausePlay();
    scrollPos = 0;
    applyScroll(); updateSeek();
  }

  function triggerPeek() {
    if (!isPlaying) return;
    document.body.classList.add('peek');
    clearTimeout(peekTimer);
    peekTimer = setTimeout(() => document.body.classList.remove('peek'), 3000);
  }
  document.addEventListener('mousemove',  triggerPeek);
  document.addEventListener('touchstart', triggerPeek, { passive: true });

  function toggleMirrorH() {
    isMirroredH = !isMirroredH;
    document.getElementById('mirrorHBtn').classList.toggle('on', isMirroredH);
    wrapper.classList.toggle('mirror-h', isMirroredH);
  }
  function toggleMirrorV() {
    isMirroredV = !isMirroredV;
    document.getElementById('mirrorVBtn').classList.toggle('on', isMirroredV);
    wrapper.classList.toggle('mirror-v', isMirroredV);
    applyScroll();
  }

  function toggleTheme() {
    isLight = !isLight;
    document.body.classList.toggle('light-theme', isLight);
    const btn = document.getElementById('themeBtn');
    btn.textContent = isLight ? '🌙' : '☀';
    btn.classList.toggle('on', isLight);
  }

  function openEditor() {
    pausePlay();
    document.getElementById('scriptInput').value = promptText.textContent;
    document.getElementById('editorPanel').classList.add('open');
    document.getElementById('scriptInput').focus();
  }
  function closeEditor() { document.getElementById('editorPanel').classList.remove('open'); }
  function applyText() {
    const val = document.getElementById('scriptInput').value.trim();
    if (val) { promptText.textContent = val; resetPlay(); }
    closeEditor();
  }

  let badgeTimer = null;
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA') return;
    keyBadge.textContent = e.code + (e.key !== e.code ? ' [' + e.key + ']' : '');
    keyBadge.style.opacity = '1';
    clearTimeout(badgeTimer);
    badgeTimer = setTimeout(() => { keyBadge.style.opacity = '0'; }, 2000);

    switch (e.code) {
      case 'Space': case 'Enter': case 'MediaPlayPause':
        e.preventDefault(); isPlaying ? pausePlay() : startPlay(); break;
      case 'ArrowUp': case 'AudioVolumeUp': case 'VolumeUp':
        e.preventDefault(); scrollPos = Math.max(scrollPos - 160, 0); applyScroll(); updateSeek(); break;
      case 'ArrowDown': case 'AudioVolumeDown': case 'VolumeDown':
        e.preventDefault(); scrollPos = Math.min(scrollPos + 160, getMaxScroll()); applyScroll(); updateSeek(); break;
      case 'ArrowLeft':  e.preventDefault(); scrollPos = Math.max(scrollPos - 160, 0); applyScroll(); updateSeek(); break;
      case 'ArrowRight': e.preventDefault(); scrollPos = Math.min(scrollPos + 160, getMaxScroll()); applyScroll(); updateSeek(); break;
      case 'KeyR': resetPlay(); break;
      case 'KeyE': openEditor(); break;
      case 'KeyT': toggleTheme(); break;
      case 'KeyH': toggleMirrorH(); break;
      case 'KeyV': toggleMirrorV(); break;
    }
  });
</script>
</body>
</html>
